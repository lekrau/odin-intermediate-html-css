<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='UTF-8' />
    <title>Speaker Submission</title>
    <link rel='stylesheet' href='styles.css' />
</head>

<body>
    <header class='speaker-form-header'>
        <h1>Speaker Submission</h1>
        <p><em>Want to speak at our fake conference? Fill out
                this form.</em></p>
    </header>
    <form action='' method='get' class='speaker-form'>
        <div class='form-row'>
            <label for='full-name'>Name</label>
            <input id='full-name' name='full-name' type='text' />
        </div>
        <div class='form-row'>
            <label for='email'>Email</label>
            <input id='email' name='email' type='email' placeholder='joe@example.com' />
        </div>
        <div class='form-row'>
            <label for="type-of-talk">Type of talk</label>
            <input type="radio" id="main-stage" name="type-of-talk" value="">
            <label for="main-stage">Main Stage</label>
            <input type="radio" id="workshop" name="type-of-talk">
            <label for="workshop">Workshop</label>
        </div>
        <div class='form-row'>
            <label for="t-shirt_size">T-Shirt Size</label>
            <select id="t-shirt_size" name="t-shirt_size">
                <option>Extra Small</option>
                <option>Small</option>
                <option>Medium</option>
                <option>Large</option>
                <option>Extra Large</option>
            </select>
        </div>
        <div class='form-row'>
            <label for="abstract">Abstract</label>
            <textarea id="abstract" maxlength="500" name="abstract"></textarea>
            Describe your talk in 500 words or less
        </div>
        <div class='form-row'>
            <input type="checkbox" id="available" name="available">
            <label for="available">I'm actually available the day of the talk</label>
        </div>
        <div class='form-row'>
            <button type="submit">Submit</button>
        </div>
    </form>
</body>

</html>
